apiVersion: v1
kind: LimitRange
metadata:
  name: default-container-limits
  namespace: gitops-demo-quotas
  labels:
    managed-by: argocd
spec:
  limits:
    - type: Container
      default:
        cpu: "500m"
        memory: "256Mi"
      defaultRequest:
        cpu: "100m"
        memory: "128Mi"
      max:
        cpu: "2"
        memory: "1Gi"
      min:
        cpu: "50m"
        memory: "64Mi"
